name: passing-env-bt-jobs
on: [ push ]

jobs:
  JOB_1:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{steps.step1.outputs.test}}
      output2: ${{steps.step2.outputs.test}}
    steps:
      - name: STEP-1
        id: step1
        run: echo "test=hello" >> $GITHUB_OUTPUT
      - name: STEP-2
        id: step2
        run: echo "test=world" >> $GITHUB_OUTPUT
  JOB_2:
    runs-on: ubuntu-latest
    needs: JOB_1
    steps:
      - env:
          OUTPUT_1: ${{needs.JOB_1.outputs.output1}}
          OUTPUT_2: ${{needs.JOB_1.outputs.output2}}
        run: echo "$OUTPUT_1 $OUTPUT_2"

