name: 'Custom GITHUB_ENV Var'

on: workflow_dispatch

env:
  MY_PASSWORD: 123tilkjljdsfa@123

jobs:
  custom_GITHUB_ENV:
    runs-on: ubuntu-latest
    steps:
      - name: Set the value
        id: step_one
        run: |
          echo "action_state=TechITFactory" >> $GITHUB_ENV
      - name: Use the value
        id: step_two
        run: |
          echo "${GITHUB_ACTION}"
          echo "${{env.action_state}}"